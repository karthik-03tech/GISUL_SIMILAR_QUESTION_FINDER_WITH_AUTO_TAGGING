{% extends "base.html" %}

{% block title %}Login — GISUL{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h1>Welcome Back</h1>
    <p>Log in to continue to GISUL</p>
  </div>

  <form method="POST" action="{{ url_for('login') }}" novalidate>
    <div class="form-group">
      <label for="email">Email address</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="you@example.com"
        required
        autocomplete="email"
      />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Your password"
        required
        autocomplete="current-password"
      />
    </div>

    <div class="form-group">
      <div class="checkbox-row">
        <input type="checkbox" id="remember" name="remember" />
        <label for="remember" style="margin:0">Remember me for 30 days</label>
      </div>
    </div>

    <!--
      On POST, the route calls:
        user.check_password(password)
          └─ check_password_hash(stored_hash, plain_text_password)
               → True  → login_user(user)  → session cookie set
               → False → flash "Invalid credentials"
    -->
    <button type="submit" class="btn" id="login-btn">Log In</button>
  </form>

  <div class="form-footer">
    Don't have an account? <a href="{{ url_for('register') }}">Sign up</a>
  </div>
</div>
{% endblock %}
