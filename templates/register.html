{% extends "base.html" %}

{% block title %}Register — GISUL{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h1>Create Account</h1>
    <p>Join GISUL to start asking questions</p>
  </div>

  <form method="POST" action="{{ url_for('register') }}" novalidate>
    <div class="form-group">
      <label for="email">Email address</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="you@example.com"
        required
        autocomplete="email"
      />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="At least 6 characters"
        required
        autocomplete="new-password"
      />
    </div>

    <div class="form-group">
      <label for="confirm_password">Confirm Password</label>
      <input
        type="password"
        id="confirm_password"
        name="confirm_password"
        placeholder="Repeat your password"
        required
        autocomplete="new-password"
      />
    </div>

    <!--
      On POST, the route calls:
        new_user.set_password(password)
          └─ generate_password_hash(plain_text_password)
               → returns "pbkdf2:sha256:260000$salt$hash"
               → stored in users.password column
    -->
    <button type="submit" class="btn" id="register-btn">Create Account</button>
  </form>

  <div class="form-footer">
    Already have an account? <a href="{{ url_for('login') }}">Log in</a>
  </div>
</div>
{% endblock %}
